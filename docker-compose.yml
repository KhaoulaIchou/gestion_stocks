services:
  backend:
    build:
      context: ./backend-stock
      dockerfile: Dockerfile
    container_name: stock-backend
    environment:
      - DATABASE_URL=mysql://root@host.docker.internal:3306/gestion_stock
      - NODE_ENV=production
      - JWT_SECRET=changeme
      - JWT_EXPIRES=7d
    ports:
      - "4000:3000"
    restart: unless-stopped
    command: >
      bash -lc "
        npx prisma generate &&
        npx prisma db push &&
        npm run build &&
        npm run start:prod
      "

  frontend:
    build:
      context: ./frontend-stock
      dockerfile: Dockerfile.dev
    container_name: stock-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend-stock:/app
      - /app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"